name: Keep Bot Alive

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  restart-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart bot via API
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/osielgarcia/consoles/)
          echo "Respuesta: $RESPONSE"
