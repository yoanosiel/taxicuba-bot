name: Keep Bot Alive

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  restart-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Restart bot via PythonAnywhere API
        run: |
          curl -s \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            -X POST \
            -d "command=pgrep -f bot.py || cd ~/taxicuba-bot && nohup python bot.py > ~/bot.log 2>&1 &" \
            -d "working_directory=/home/osielgarcia" \
            -d "expiry=600" \
            https://www.pythonanywhere.com/api/v0/user/osielgarcia/schedule/
          echo "Comando enviado OK"
