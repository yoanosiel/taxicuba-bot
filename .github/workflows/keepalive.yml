name: Keep Bot Alive

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  restart-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart bot via API
        run: |
          curl -s -X POST \
            --data-urlencode "command=pgrep -f bot.py || (cd ~/taxicuba-bot && pkill -f bot.py; nohup python bot.py > ~/bot.log 2>&1 &)" \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/osielgarcia/consoles/ \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Consola creada:', d.get('id', 'error'))"
